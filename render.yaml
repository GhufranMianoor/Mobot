services:
  - type: web
    name: mobot
    env: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-haiku
      - key: OPENROUTER_APP_NAME
        value: Mobot
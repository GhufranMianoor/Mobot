<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobot Smart Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="search-shell">
      <header class="topbar">
        <h1>Mobot</h1>
        <button id="knnCheckButton" class="ghost-btn" type="button" aria-label="Run k-NN diagnostics">k-NN Check</button>
      </header>

      <section class="hero">
        <p class="eyebrow">Smart Search Engine</p>
        <h2>Mobot Search</h2>
        <br>

        <form id="searchForm" class="search-form" role="search">
          <label for="queryInput" class="sr-only">Search phones</label>
          <input id="queryInput" type="text" autocomplete="off" required placeholder="Search phones with natural language..." />
          <button type="submit">Search</button>
        </form>

        <section class="chips" id="chips" aria-label="Quick searches">
          <button class="chip" type="button">Gaming phone under 80k with max battery</button>
          <button class="chip" type="button">Show all samsung phones</button>
          <button class="chip" type="button">Premium camera phone</button>
          <button class="chip" type="button">Best phone under 50k</button>
        </section>
      </section>

      <section class="result-meta" id="resultMeta" aria-live="polite"></section>
      <section id="diagPanel" class="diag-panel" aria-live="polite"></section>
      <section id="resultsGrid" class="results-grid" aria-live="polite"></section>
    </main>

    <template id="phoneCardTemplate">
      <article class="phone-card">
        <h3 class="phone-name"></h3>
        <p class="phone-specs"></p>
        <div class="badge-row">
          <span class="tier-pill"></span>
          <span class="deal-pill"></span>
        </div>
        <div class="meta-row">
          <span class="price"></span>
          <span class="source-link">Source</span>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
